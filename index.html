<html>
<head>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  font-family: 'Times New Roman', serif;
  background-color: black;
}

.video-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: 0;
}

.video-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0, 0, 0, 0.35);
  z-index: 1;
}

.content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding-top: 80px;
}

h1 {
  margin: 0 0 30px 0;
}

img {
  max-width: 90%;
  height: auto;
}
</style>
</head>

<body>

<video class="video-bg" autoplay muted loop playsinline>
  <source src="background.mp4" type="video/mp4">
</video>

<div class="video-overlay"></div>

<div class="content">
  <h1>
    <img src="https://avatars.githubusercontent.com/u/44903784?v=4" alt="" width="360" height="360" />
  </h1>

  <h1>
    <img src="name.png" alt="" />
  </h1>
</div>

</body>
</html>
