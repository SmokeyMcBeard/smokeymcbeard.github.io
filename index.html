<html>
<head>
<style>
body {
  margin: 0;
  font-family: 'Times New Roman', serif;
  background-color: black;
  overflow-x: hidden;
}

.video-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

.video-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.45);
  z-index: -1;
}

.content {
  position: relative;
  z-index: 1;
  text-align: center;
  padding-top: 40px;
}
</style>
</head>

<body>

<video class="video-bg" autoplay muted loop playsinline>
  <source src="background.mp4" type="video/mp4">
</video>

<div class="video-overlay"></div>

<div class="content">
  <h1>
    <img src="https://avatars.githubusercontent.com/u/44903784?v=4" alt="" width="360" height="360" />
  </h1>

  <h1>
    <img src="name.png" alt="" />
  </h1>
</div>

</body>
</html>
